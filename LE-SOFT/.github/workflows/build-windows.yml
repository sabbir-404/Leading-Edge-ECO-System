name: Build & Publish Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        # Skip postinstall (electron-rebuild) — we run it explicitly next step
        run: npm install --ignore-scripts
        env:
          npm_config_arch: x64

      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          npm_config_arch: x64

      - name: Build & Publish Windows Release
        run: npm run dist:publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload Installer as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LESOFT-Windows-Installer
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: warn
