name: Build & Publish macOS

on:
  push:
    branches:
      - main-mac
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build & Publish macOS Release
        # electron-builder --mac -p always:
        #   - Builds the .dmg and .zip
        #   - Uploads them plus latest-mac.yml to a GitHub Release
        #   - latest-mac.yml is what electron-updater reads on macOS end-user machines
        run: npm run dist:mac:publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LESOFT-macOS
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
