name: Build & Publish macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        # Skip postinstall (electron-rebuild) — not needed for macOS build on CI
        run: npm install --ignore-scripts
        env:
          npm_config_arch: x64

      - name: Install Python (for native module builds)
        run: pip3 install setuptools || true

      - name: Rebuild better-sqlite3 for Electron
        run: npx electron-rebuild -f -w better-sqlite3
        env:
          npm_config_arch: x64

      - name: Build & Publish macOS Release
        run: npm run dist:mac:publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LESOFT-macOS
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
          if-no-files-found: warn
