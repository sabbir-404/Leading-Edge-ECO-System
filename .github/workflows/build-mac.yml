name: Build & Publish macOS

on:
  push:
    branches:
      - main-mac
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: LE-SOFT

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 is required by @electron/rebuild@4 and modern supabase packages
          node-version: 22
          cache: 'npm'
          cache-dependency-path: LE-SOFT/package-lock.json

      - name: Install Dependencies
        # --ignore-scripts skips the postinstall electron-rebuild.
        # electron-builder install-app-deps (run below) handles native modules correctly.
        run: npm install --ignore-scripts

      - name: Install Native Modules for Electron
        # This is the electron-builder recommended way to rebuild natives for the
        # correct Electron ABI, arch, and platform.
        run: npx electron-builder install-app-deps

      - name: Build & Publish macOS Release
        # electron-builder --mac -p always:
        #   - Builds .dmg and .zip
        #   - Uploads both + latest-mac.yml to a GitHub Release
        #   - latest-mac.yml is what electron-updater reads on end-user macs
        run: npm run dist:mac:publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LESOFT-macOS
          path: |
            LE-SOFT/release/*.dmg
            LE-SOFT/release/*.zip
            LE-SOFT/release/latest-mac.yml
