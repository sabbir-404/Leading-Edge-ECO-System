name: Build & Publish Windows

on:
  push:
    branches:
      - main-mac
      - main-windows
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without leading v'
        required: true
        default: '1.4.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: LE-SOFT

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 is required by @electron/rebuild@4 and modern supabase packages
          node-version: 22
          cache: 'npm'
          cache-dependency-path: LE-SOFT/package-lock.json

      - name: Install Dependencies
        # --ignore-scripts skips the postinstall electron-rebuild.
        # electron-builder install-app-deps (run below) handles native modules correctly.
        run: npm ci --ignore-scripts
        env:
          npm_config_arch: x64

      - name: Install Native Modules for Electron
        # Rebuilds better-sqlite3 for the correct Electron ABI + win32-x64
        run: npx electron-builder install-app-deps

      - name: Build Windows Release
        # Builds the NSIS installer (.exe), .exe.blockmap, and latest.yml.
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Windows Release Assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.event.inputs.version || '1.4.0' }}
          RELEASE_REPO: ${{ github.repository }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "v$env:RELEASE_VERSION"
          $title = "LE-SOFT $env:RELEASE_VERSION"
          $notes = "LE-SOFT $env:RELEASE_VERSION Windows release."

          gh release view $tag --repo $env:RELEASE_REPO
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $env:RELEASE_REPO --target $env:GITHUB_SHA --title $title --notes $notes
          }

          gh release upload $tag `
            "release/LESOFT Setup $env:RELEASE_VERSION.exe" `
            "release/LESOFT Setup $env:RELEASE_VERSION.exe.blockmap" `
            "release/latest.yml" `
            --repo $env:RELEASE_REPO `
            --clobber

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LESOFT-Windows-Installer
          path: |
            LE-SOFT/release/*.exe
            LE-SOFT/release/*.exe.blockmap
            LE-SOFT/release/latest.yml
