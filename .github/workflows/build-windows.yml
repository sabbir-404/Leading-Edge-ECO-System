name: Build & Publish Windows

on:
  push:
    branches:
      - main-windows
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: LE-SOFT

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: LE-SOFT/package-lock.json

      - name: Install Dependencies
        run: npm install
        env:
          npm_config_arch: x64

      - name: Build & Publish Windows Release
        run: npm run dist:publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LESOFT-Windows-Installer
          path: |
            LE-SOFT/release/*.exe
            LE-SOFT/release/*.exe.blockmap
            LE-SOFT/release/latest.yml
